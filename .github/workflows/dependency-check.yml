name: GitHub Actions OpenJCEPlus Dependency Check
run-name: ${{ github.actor }} is running scheduled dependency check 🚀
on:
  schedule:
    #- cron: '0 1 * * 0'   # Sunday 01:00 UTC = Saturday 9:00 PM in Toronto during EDT
    - cron: '17 22 * * *'
  workflow_dispatch:
jobs:
  Dependency-Check-OpenJCEPlus:
    name: Scheduled OpenJCEPlus Dependency Check
    runs-on: ${{ matrix.os }}
    permissions:
      checks: write # Needed to publish a check from the Publish Test Report step below.
      contents: read # Needed to read the contents of the github repo and clone.
    strategy:
        matrix:
          # "windows-2022" os builds have been disabled since Open Crypto Kit does not have builds available for windows.
          os: [ubuntu-22.04]
          include:
            - os: ubuntu-22.04
              gskit_dir: amd64
              gskit_lib_name: libjgsk8iccs_64.so
              target_lib_bin_dir: jgskit-xa-64
              github_actions_runner_root: /
            #- os: windows-2022
            #  gskit_dir: windows_x86_64
            #  gskit_lib_name: jgsk8iccs_64.dll
            #  github_actions_runner_root: \
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server."
      - run: echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."
      - name: Check out repository code
        uses: actions/checkout@v4
      - run: echo "💡 The ${{ github.repository }} repository has been cloned to the runner."
      - run: echo "🖥️ The workflow is now ready to run dependency check on the runner."
      - name: List files in the repository
        run: |
          tree ${{ github.workspace }}
#      - name: Set up Visual Studio shell
#        uses: egor-tensin/vs-shell@v2
#        with:
#          arch: x64
      - name: Setup Temurin JDK
        uses: actions/setup-java@v4
        with:
          java-version: '26-ea'
          distribution: 'temurin'
          architecture: 'x64'
      - name: Run dependency-check check
        run: > 
          mvn
          --batch-mode
          '-Dock.library.path=${{ github.workspace }}/OCK/'
          dependency-check:check
        env:
          GSKIT_HOME: ${{ github.workspace }}/OCK/jgsk_sdk
      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
      - name: Add dependency-check summary
        if: always()
        run: |
          echo "The Dependency Check Report was uploaded as artifact: \`dependency-check-report\`." >> $GITHUB_STEP_SUMMARY
      - run: echo "🍏 This job's status is ${{ job.status }}."
