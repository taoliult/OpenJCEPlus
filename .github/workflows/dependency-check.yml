name: GitHub Actions OpenJCEPlus Dependency Check
run-name: ${{ github.actor }} is running scheduled dependency check 🚀
on:
  #pull_request:
  #  types: [opened]
  schedule:
    - cron: '0 10 * * 6,0' # 10:00 UTC = 6:00 AM EDT, Saturday and Sunday
  workflow_dispatch:
jobs:
  Dependency-Check-OpenJCEPlus:
    name: Scheduled OpenJCEPlus Dependency Check
    runs-on: ${{ matrix.os }}
    permissions:
      actions: write
      checks: write
      contents: read
    strategy:
        matrix:
          os: [ubuntu-22.04]
          include:
            - os: ubuntu-22.04
              gskit_dir: amd64
              gskit_lib_name: libjgsk8iccs_64.so
              target_lib_bin_dir: jgskit-xa-64
              github_actions_runner_root: /
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server."
      - run: echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."
      - name: Check out repository code
        uses: actions/checkout@v4
      - run: echo "💡 The ${{ github.repository }} repository has been cloned to the runner."
      - run: echo "🖥️ The workflow is now ready to run dependency check on the runner."
      - name: List files in the repository
        run: |
          tree ${{ github.workspace }}
      - name: Setup Temurin JDK
        uses: actions/setup-java@v4
        with:
          java-version: '26-ea'
          distribution: 'temurin'
          architecture: 'x64'
      - name: Compute OWASP DB cache key
        id: cache-key
        run: |
          KEY="${{ runner.os }}-dependency-check-data-$(date +%F)-${{ github.run_number }}-${{ github.run_attempt }}"
          PREFIX="${{ runner.os }}-dependency-check-data-"
          echo "Computed key: $KEY"
          echo "Computed prefix: $PREFIX"
          echo "key=$KEY" >> "$GITHUB_OUTPUT"
          echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"
      - name: Restore OWASP Dependency-Check DB cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            ${{ steps.cache-key.outputs.prefix }}
      - name: Show OWASP DB size before scan
        if: always()
        run: |
          DB_PATH="$HOME/.m2/repository/org/owasp/dependency-check-data"
          if [ -d "$DB_PATH" ]; then
            SIZE=$(du -sh "$DB_PATH" | cut -f1)
            echo "OWASP DB size before scan: $SIZE"
            echo "OWASP DB size before scan: \`$SIZE\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "OWASP DB size before scan: not present"
            echo "OWASP DB size before scan: not present" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Run dependency-check check
        run: > 
          mvn
          --batch-mode
          dependency-check:check
      - name: Show OWASP DB size after scan
        if: always()
        run: |
          DB_PATH="$HOME/.m2/repository/org/owasp/dependency-check-data"
          if [ -d "$DB_PATH" ]; then
            SIZE=$(du -sh "$DB_PATH" | cut -f1)
            echo "OWASP DB size after scan: $SIZE"
            echo "OWASP DB size after scan: \`$SIZE\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "OWASP DB size after scan: not present"
            echo "OWASP DB size after scan: not present" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Save OWASP Dependency-Check DB cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: ${{ steps.cache-key.outputs.key }}
      - name: Delete older OWASP DB caches
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          CURRENT_KEY: ${{ steps.cache-key.outputs.key }}
          PREFIX: ${{ steps.cache-key.outputs.prefix }}
        run: |
          gh cache list --repo "$REPO" --key "$PREFIX" --limit 100 | while read -r id key size created last_accessed ref; do
            if [ "$key" != "$CURRENT_KEY" ]; then
              echo "Deleting old cache: $key"
              gh cache delete "$key" --repo "$REPO" || true
            fi
          done
      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
      - name: Add dependency-check summary
        if: always()
        run: |
          echo "The Dependency Check Report was uploaded as artifact: \`dependency-check-report\`." >> $GITHUB_STEP_SUMMARY
      - run: echo "🍏 This job's status is ${{ job.status }}."
